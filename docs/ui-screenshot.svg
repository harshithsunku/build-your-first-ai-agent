<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" role="img" aria-label="Mockup of a with-UI notebook: a Gradio app with a question box, a Run button, the final answer, and a live agent-trace panel showing the model requesting tools and receiving results.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="btnG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- window chrome -->
  <rect x="24" y="20" width="912" height="500" rx="12" fill="#161b22" stroke="#30363d"/>
  <circle cx="48" cy="44" r="6" fill="#f85149"/>
  <circle cx="68" cy="44" r="6" fill="#d29922"/>
  <circle cx="88" cy="44" r="6" fill="#3fb950"/>
  <text x="480" y="48" text-anchor="middle" fill="#8b949e" font-size="13">localhost:7860  ·  Gradio</text>
  <line x1="24" y1="64" x2="936" y2="64" stroke="#30363d"/>

  <!-- title -->
  <text x="48" y="98" fill="#e6edf3" font-size="20" font-weight="700">Codebase Explainer Agent</text>
  <text x="48" y="120" fill="#8b949e" font-size="13">Ask a question about a source tree — the agent uses read-only ls / cat / grep / find.</text>

  <!-- left column: inputs + answer -->
  <text x="48" y="158" fill="#8b949e" font-size="12">Project path</text>
  <rect x="48" y="166" width="408" height="34" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="62" y="188" fill="#c9d1d9" font-size="13" font-family="ui-monospace, monospace">./</text>

  <text x="48" y="226" fill="#8b949e" font-size="12">Your question</text>
  <rect x="48" y="234" width="408" height="64" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="62" y="258" fill="#c9d1d9" font-size="13">What does this project do, and how is it</text>
  <text x="62" y="278" fill="#c9d1d9" font-size="13">structured?</text>

  <rect x="48" y="314" width="120" height="38" rx="8" fill="url(#btnG)"/>
  <text x="108" y="338" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">Run agent</text>

  <text x="48" y="386" fill="#8b949e" font-size="12">Answer</text>
  <rect x="48" y="394" width="408" height="104" rx="8" fill="#0d1117" stroke="#238636"/>
  <text x="62" y="418" fill="#c9d1d9" font-size="12.5">It's a teaching repo of six notebooks that</text>
  <text x="62" y="437" fill="#c9d1d9" font-size="12.5">build an AI agent layer by layer. The core</text>
  <text x="62" y="456" fill="#c9d1d9" font-size="12.5">loop lives in notebook 02 and is reused by</text>
  <text x="62" y="475" fill="#c9d1d9" font-size="12.5">04–06 with different tools…</text>

  <!-- right column: agent trace -->
  <text x="488" y="158" fill="#8b949e" font-size="12">Agent trace</text>
  <rect x="488" y="166" width="424" height="332" rx="8" fill="#010409" stroke="#30363d"/>

  <text x="504" y="192" font-family="ui-monospace, monospace" font-size="12" fill="#58a6ff">→ tool  list_dir(".")</text>
  <text x="504" y="212" font-family="ui-monospace, monospace" font-size="12" fill="#8b949e">  6 notebooks, README.md, setup.sh…</text>

  <text x="504" y="240" font-family="ui-monospace, monospace" font-size="12" fill="#58a6ff">→ tool  read_file("README.md")</text>
  <text x="504" y="260" font-family="ui-monospace, monospace" font-size="12" fill="#8b949e">  "Build Your First AI Agent…"</text>

  <text x="504" y="288" font-family="ui-monospace, monospace" font-size="12" fill="#58a6ff">→ tool  grep("def run_agent")</text>
  <text x="504" y="308" font-family="ui-monospace, monospace" font-size="12" fill="#8b949e">  02_agent_from_scratch.ipynb:1</text>

  <text x="504" y="336" font-family="ui-monospace, monospace" font-size="12" fill="#a371f7">→ model  thinking…</text>

  <text x="504" y="364" font-family="ui-monospace, monospace" font-size="12" fill="#3fb950">✓ final answer (3 tool calls, 4 hops)</text>

  <line x1="488" y1="384" x2="912" y2="384" stroke="#21262d"/>
  <text x="504" y="410" font-family="ui-monospace, monospace" font-size="11.5" fill="#6e7681">max_iterations = 8  (TTL / hop count)</text>
  <text x="504" y="430" font-family="ui-monospace, monospace" font-size="11.5" fill="#6e7681">tools are read-only, sandboxed to ROOT</text>

  <text x="488" y="480" fill="#6e7681" font-size="11">Same loop as notebook 02 — only the tools changed.</text>
</svg>
